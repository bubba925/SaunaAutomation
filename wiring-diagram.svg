<svg viewBox="0 0 1200 580" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">

  <rect width="1200" height="580" fill="#0f172a"/>

  <text x="600" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#f1f5f9">Golden Designs / Dynamic Sauna — Smart Home Wiring</text>
  <text x="600" y="44" text-anchor="middle" font-size="10" fill="#475569">ESPHome + Home Assistant · LC Technology ESP8266 Relay X2 · DS18B20 · Shelly 16A</text>

  <!-- ================================================================
       WIRES — endpoints match port tick positions exactly
  ================================================================ -->

  <!-- 12V Tap → Buck -->
  <line x1="180" y1="96" x2="236" y2="96" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="180" y1="112" x2="236" y2="112" stroke="#64748b" stroke-width="2.5"/>
  <text x="208" y="90" text-anchor="middle" font-size="8" fill="#ef4444" font-weight="600">+12V</text>
  <text x="208" y="125" text-anchor="middle" font-size="8" fill="#64748b">GND</text>

  <!-- Buck → Relay top (enters at IN+ x=252 and IN- x=270, y=220) -->
  <polyline points="330,132 330,178 252,178 252,220" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <polyline points="348,132 348,192 270,192 270,220" fill="none" stroke="#64748b" stroke-width="2.5"/>
  <!-- Wire labels near relay top entry -->
  <text x="248" y="214" text-anchor="middle" font-size="7" fill="#ef4444" font-weight="600">IN+</text>
  <text x="270" y="214" text-anchor="middle" font-size="7" fill="#64748b">IN−</text>

  <!-- Relay 5V header (right edge y=258) → AMS1117 left (y=96) -->
  <polyline points="446,258 526,258 526,96 632,96" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <polyline points="446,274 542,274 542,112 632,112" fill="none" stroke="#64748b" stroke-width="2.5"/>
  <text x="500" y="250" text-anchor="middle" font-size="8" fill="#ef4444" font-weight="600">5V</text>

  <!-- AMS1117 LEFT FORK → ESP-01 top (VCC x=610, GND x=626, y=220) -->
  <polyline points="658,132 658,186 610,186 610,220" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <polyline points="674,132 674,200 626,200 626,220" fill="none" stroke="#64748b" stroke-width="2.5"/>
  <!-- Wire labels near ESP-01 top entry -->
  <text x="606" y="214" text-anchor="middle" font-size="7" fill="#ef4444" font-weight="600">VCC</text>
  <text x="626" y="214" text-anchor="middle" font-size="7" fill="#64748b">GND</text>

  <!-- AMS1117 RIGHT FORK → DS18B20 right edge (VCC y=478, GND y=494)
       Routes RIGHT past both boxes at x=828/844 then enters DS18B20 from right -->
  <polyline points="788,132 828,132 828,478 778,478" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <polyline points="804,132 844,132 844,494 778,494" fill="none" stroke="#64748b" stroke-width="2.5"/>
  <!-- Right fork label on vertical run -->
  <text x="840" y="310" text-anchor="middle" font-size="7" fill="#ef4444" font-weight="600" transform="rotate(-90 840 310)">3.3V → DS18B20</text>
  <text x="856" y="310" text-anchor="middle" font-size="7" fill="#64748b" transform="rotate(-90 856 310)">GND</text>

  <!-- ESP-01 GPIO2 (exits bottom x=676, y=356) → DS18B20 top (x=676, y=444) -->
  <line x1="676" y1="356" x2="676" y2="444" stroke="#eab308" stroke-width="2.5"/>
  <!-- Wire label on the data run -->
  <text x="690" y="404" font-size="8" fill="#eab308" font-weight="600">GPIO2</text>
  <text x="690" y="415" font-size="8" fill="#eab308">data</text>

  <!-- Relay COM1 (left y=280) → POWER top (x=82, y=448) -->
  <polyline points="182,280 82,280 82,448" fill="none" stroke="#f97316" stroke-width="2.5"/>
  <!-- Relay NO1 (left y=298) → POWER top (x=99, y=448) -->
  <polyline points="182,298 99,298 99,448" fill="none" stroke="#f97316" stroke-width="2.5"/>
  <!-- Labels on left run -->
  <text x="76" y="366" text-anchor="middle" font-size="8" fill="#f97316" font-weight="600" transform="rotate(-90 76 366)">COM1</text>
  <text x="93" y="366" text-anchor="middle" font-size="8" fill="#f97316" transform="rotate(-90 93 366)">NO1</text>

  <!-- Relay COM2 (bottom x=252, y=378) → WORK top (x=252, y=448) -->
  <line x1="252" y1="378" x2="252" y2="448" stroke="#f97316" stroke-width="2.5"/>
  <!-- Relay NO2 (bottom x=270, y=378) → WORK top (x=270, y=448) -->
  <line x1="270" y1="378" x2="270" y2="448" stroke="#f97316" stroke-width="2.5"/>
  <!-- Labels on bottom run -->
  <text x="247" y="416" text-anchor="middle" font-size="8" fill="#f97316" font-weight="600" transform="rotate(-90 247 416)">COM2</text>
  <text x="264" y="416" text-anchor="middle" font-size="8" fill="#f97316" transform="rotate(-90 264 416)">NO2</text>

  <!-- Shelly AC dashed -->
  <polyline points="1014,443 1014,408" fill="none" stroke="#818cf8" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- ================================================================
       SECTION LABELS
  ================================================================ -->
  <rect x="20" y="58" width="82" height="13" rx="3" fill="#1d4ed8"/>
  <text x="61" y="68" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="700">POWER SOURCE</text>

  <rect x="182" y="206" width="88" height="13" rx="3" fill="#15803d"/>
  <text x="226" y="216" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="700">RELAY CONTROL</text>

  <rect x="592" y="206" width="108" height="13" rx="3" fill="#1d4ed8"/>
  <text x="646" y="216" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="700">TEMP MONITORING</text>

  <rect x="48" y="434" width="86" height="13" rx="3" fill="#7e22ce"/>
  <text x="91" y="444" text-anchor="middle" font-size="7.5" fill="#fff" font-weight="700">SAUNA PANEL</text>

  <!-- ================================================================
       COMPONENT BOXES — minimal interior text, port ticks on edges
  ================================================================ -->

  <!-- 12V Tap -->
  <rect x="20" y="72" width="160" height="55" rx="7" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="97" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">Sauna 12V Tap</text>
  <text x="100" y="114" text-anchor="middle" font-size="10" fill="#60a5fa">Black + Green wire</text>

  <!-- Buck Converter -->
  <rect x="236" y="72" width="192" height="55" rx="7" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="332" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">Buck Converter</text>
  <text x="332" y="110" text-anchor="middle" font-size="10" fill="#94a3b8">12V → 5V</text>
  <rect x="254" y="116" width="156" height="14" rx="3" fill="#1c1917" stroke="#78350f" stroke-width="1"/>
  <text x="332" y="127" text-anchor="middle" font-size="7.5" fill="#fbbf24" font-weight="600">680µF across output</text>

  <!-- AMS1117 -->
  <rect x="632" y="72" width="174" height="55" rx="7" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="719" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">AMS1117</text>
  <text x="719" y="110" text-anchor="middle" font-size="10" fill="#94a3b8">5V → 3.3V</text>
  <rect x="648" y="116" width="156" height="14" rx="3" fill="#1c1917" stroke="#78350f" stroke-width="1"/>
  <text x="726" y="127" text-anchor="middle" font-size="7.5" fill="#fbbf24" font-weight="600">100µF across output</text>
  <!-- Fork labels below box -->
  <text x="658" y="145" font-size="8" fill="#94a3b8">↙ ESP-01</text>
  <text x="772" y="145" font-size="8" fill="#94a3b8">↘ DS18B20</text>

  <!-- LC Technology Relay Board -->
  <rect x="182" y="220" width="264" height="158" rx="7" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="314" y="244" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">LC Technology</text>
  <text x="314" y="259" text-anchor="middle" font-size="10" fill="#4ade80">ESP8266 Relay X2</text>
  <line x1="198" y1="266" x2="430" y2="266" stroke="#1e3a2e" stroke-width="1"/>
  <!-- Left edge ticks + labels (COM1 y=280, NO1 y=298) -->
  <line x1="182" y1="280" x2="196" y2="280" stroke="#f97316" stroke-width="1.5"/>
  <text x="200" y="284" font-size="9" fill="#f97316">COM1</text>
  <line x1="182" y1="298" x2="196" y2="298" stroke="#f97316" stroke-width="1.5"/>
  <text x="200" y="302" font-size="9" fill="#f97316">NO1</text>
  <!-- Bottom edge ticks + labels (COM2 x=252, NO2 x=270) -->
  <line x1="252" y1="366" x2="252" y2="378" stroke="#f97316" stroke-width="1.5"/>
  <text x="248" y="363" text-anchor="middle" font-size="8" fill="#f97316">COM2</text>
  <line x1="270" y1="366" x2="270" y2="378" stroke="#f97316" stroke-width="1.5"/>
  <text x="274" y="363" font-size="8" fill="#f97316">NO2</text>
  <!-- Right edge tick + label (5V header y=258) -->
  <line x1="432" y1="258" x2="446" y2="258" stroke="#ef4444" stroke-width="1.5"/>
  <text x="428" y="255" text-anchor="end" font-size="9" fill="#ef4444">5V hdr →</text>
  <!-- Top entry labels are on the wires, not inside box -->

  <!-- ESP-01 Temp Node -->
  <rect x="592" y="220" width="214" height="136" rx="7" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="699" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">ESP-01</text>
  <text x="699" y="267" text-anchor="middle" font-size="10" fill="#60a5fa">Temp Sensor Node</text>
  <line x1="608" y1="274" x2="790" y2="274" stroke="#1e2d45" stroke-width="1"/>
  <!-- Top entry labels are on the wires (VCC, GND) -->
  <!-- Bottom edge tick + label (GPIO2 exits at x=676, y=356) -->
  <line x1="676" y1="344" x2="676" y2="356" stroke="#eab308" stroke-width="1.5"/>
  <text x="680" y="342" font-size="9" fill="#eab308">GPIO2 ↓</text>

  <!-- POWER Button -->
  <rect x="48" y="448" width="130" height="58" rx="7" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="113" y="473" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">POWER</text>
  <text x="113" y="489" text-anchor="middle" font-size="9" fill="#c084fc">Control Panel</text>
  <text x="113" y="501" text-anchor="middle" font-size="9" fill="#94a3b8">Relay 1</text>

  <!-- WORK Button -->
  <rect x="220" y="448" width="130" height="58" rx="7" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="285" y="473" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">WORK</text>
  <text x="285" y="489" text-anchor="middle" font-size="9" fill="#c084fc">Control Panel</text>
  <text x="285" y="501" text-anchor="middle" font-size="9" fill="#94a3b8">Relay 2</text>

  <!-- DS18B20 -->
  <rect x="592" y="444" width="186" height="86" rx="7" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
  <text x="685" y="468" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">DS18B20</text>
  <text x="685" y="483" text-anchor="middle" font-size="9" fill="#f472b6">Probe · built-in resistor</text>
  <line x1="608" y1="490" x2="762" y2="490" stroke="#3d1a2e" stroke-width="1"/>
  <!-- Right edge ticks + labels (VCC y=478, GND y=494) -->
  <line x1="764" y1="478" x2="778" y2="478" stroke="#ef4444" stroke-width="1.5"/>
  <text x="760" y="476" text-anchor="end" font-size="9" fill="#ef4444">VCC</text>
  <line x1="764" y1="494" x2="778" y2="494" stroke="#64748b" stroke-width="1.5"/>
  <text x="760" y="492" text-anchor="end" font-size="9" fill="#64748b">GND</text>
  <!-- Top entry label on wire (data at x=676 comes from above) -->
  <text x="680" y="442" font-size="8" fill="#eab308">↑ Data</text>

  <!-- ================================================================
       LEGEND
  ================================================================ -->
  <rect x="858" y="220" width="316" height="126" rx="7" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="1016" y="242" text-anchor="middle" font-size="11" font-weight="700" fill="#f1f5f9">Legend</text>
  <line x1="874" y1="249" x2="1158" y2="249" stroke="#334155" stroke-width="1"/>
  <line x1="874" y1="264" x2="916" y2="264" stroke="#ef4444" stroke-width="2.5"/>
  <text x="924" y="268" font-size="10" fill="#94a3b8">Positive power (+)</text>
  <line x1="874" y1="282" x2="916" y2="282" stroke="#64748b" stroke-width="2.5"/>
  <text x="924" y="286" font-size="10" fill="#94a3b8">Ground (−)</text>
  <line x1="874" y1="300" x2="916" y2="300" stroke="#f97316" stroke-width="2.5"/>
  <text x="924" y="304" font-size="10" fill="#94a3b8">Relay / button signal</text>
  <line x1="874" y1="318" x2="916" y2="318" stroke="#eab308" stroke-width="2.5"/>
  <text x="924" y="322" font-size="10" fill="#94a3b8">1-Wire data</text>
  <line x1="874" y1="336" x2="916" y2="336" stroke="#818cf8" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="924" y="340" font-size="10" fill="#94a3b8">120VAC (Shelly)</text>

  <!-- ================================================================
       SHELLY
  ================================================================ -->
  <rect x="858" y="363" width="316" height="102" rx="7" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="1016" y="386" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">Shelly 16A</text>
  <text x="1016" y="401" text-anchor="middle" font-size="10" fill="#818cf8">Wall Outlet · 120VAC</text>
  <line x1="874" y1="408" x2="1158" y2="408" stroke="#334155" stroke-width="1"/>
  <text x="874" y="424" font-size="9" fill="#64748b">switch · power (W) · energy (kWh)</text>
  <text x="874" y="440" font-size="9" fill="#64748b">Hard AC cutoff via Home Assistant</text>
  <text x="874" y="456" font-size="9" fill="#64748b">Master kill — independent of ESP devices</text>

  <!-- Flow arrows on main power wire -->
  <polygon points="226,92 220,88 220,96" fill="#ef4444"/>
  <polygon points="226,108 220,104 220,112" fill="#64748b"/>

</svg>
