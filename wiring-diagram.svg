<svg viewBox="0 0 1200 580" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">

  <!-- Dark background -->
  <rect width="1200" height="580" fill="#0f172a"/>

  <!-- Title -->
  <text x="600" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#f1f5f9">Golden Designs / Dynamic Sauna — Smart Home Wiring</text>
  <text x="600" y="48" text-anchor="middle" font-size="10" fill="#64748b">ESPHome + Home Assistant · LC Technology ESP8266 Relay X2 · DS18B20 · Shelly 16A</text>

  <!-- ================================================================ -->
  <!-- WIRES — drawn first so boxes render on top                        -->
  <!-- ================================================================ -->

  <!-- 12V Tap → Buck Converter -->
  <line x1="180" y1="96" x2="236" y2="96" stroke="#ef4444" stroke-width="2.5"/>
  <line x1="180" y1="112" x2="236" y2="112" stroke="#64748b" stroke-width="2.5"/>
  <text x="208" y="89" text-anchor="middle" font-size="8" fill="#ef4444" font-weight="600">+12V</text>
  <text x="208" y="126" text-anchor="middle" font-size="8" fill="#64748b">GND</text>

  <!-- Buck → Relay Board (5V power, routes down) -->
  <polyline points="322,134 322,180 244,180 244,220" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <polyline points="340,134 340,194 262,194 262,220" fill="none" stroke="#64748b" stroke-width="2.5"/>
  <text x="240" y="178" text-anchor="end" font-size="8" fill="#ef4444" font-weight="600">IN+</text>
  <text x="240" y="196" text-anchor="end" font-size="8" fill="#64748b">IN−</text>

  <!-- Relay 5V header → AMS1117 (routes right then up) -->
  <polyline points="444,254 524,254 524,96 630,96" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <polyline points="444,270 540,270 540,112 630,112" fill="none" stroke="#64748b" stroke-width="2.5"/>
  <text x="505" y="244" text-anchor="middle" font-size="8" fill="#ef4444" font-weight="600">5V header pin</text>

  <!-- AMS1117 → ESP-01 (LEFT FORK — routes left-down into ESP-01 top) -->
  <polyline points="658,136 658,188 606,188 606,220" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <polyline points="675,136 675,202 622,202 622,220" fill="none" stroke="#64748b" stroke-width="2.5"/>

  <!-- AMS1117 → DS18B20 (RIGHT FORK — routes RIGHT past both boxes, then down, enters DS18B20 from right) -->
  <polyline points="786,136 828,136 828,478 780,478" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <polyline points="802,136 844,136 844,494 780,494" fill="none" stroke="#64748b" stroke-width="2.5"/>
  <text x="856" y="316" text-anchor="start" font-size="8" fill="#ef4444" font-weight="600" transform="rotate(-90 856 316)">3.3V → DS18B20</text>
  <text x="874" y="316" text-anchor="start" font-size="8" fill="#64748b" transform="rotate(-90 874 316)">GND → DS18B20</text>

  <!-- ESP-01 GPIO2 → DS18B20 data (straight down) -->
  <line x1="676" y1="356" x2="676" y2="444" stroke="#eab308" stroke-width="2.5"/>
  <text x="688" y="404" font-size="8" fill="#eab308" font-weight="600">GPIO2</text>
  <text x="688" y="416" font-size="8" fill="#eab308">data only</text>

  <!-- Relay COM1/NO1 → POWER button (exit left, route down) -->
  <polyline points="180,276 80,276 80,452" fill="none" stroke="#f97316" stroke-width="2.5"/>
  <polyline points="180,294 97,294 97,452" fill="none" stroke="#f97316" stroke-width="2.5"/>
  <text x="75" y="368" text-anchor="middle" font-size="8" fill="#f97316" font-weight="600" transform="rotate(-90 75 368)">COM1</text>
  <text x="92" y="368" text-anchor="middle" font-size="8" fill="#f97316" transform="rotate(-90 92 368)">NO1</text>

  <!-- Relay COM2/NO2 → WORK button (exit bottom, route straight down) -->
  <line x1="244" y1="378" x2="244" y2="452" stroke="#f97316" stroke-width="2.5"/>
  <line x1="262" y1="378" x2="262" y2="452" stroke="#f97316" stroke-width="2.5"/>
  <text x="239" y="418" text-anchor="middle" font-size="8" fill="#f97316" font-weight="600" transform="rotate(-90 239 418)">COM2</text>
  <text x="256" y="418" text-anchor="middle" font-size="8" fill="#f97316" transform="rotate(-90 256 418)">NO2</text>

  <!-- Shelly AC dashed -->
  <polyline points="1014,445 1014,410" fill="none" stroke="#818cf8" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- ================================================================ -->
  <!-- SECTION LABELS                                                    -->
  <!-- ================================================================ -->
  <rect x="20" y="58" width="82" height="14" rx="3" fill="#1d4ed8"/>
  <text x="61" y="69" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">POWER SOURCE</text>

  <rect x="180" y="205" width="90" height="14" rx="3" fill="#15803d"/>
  <text x="225" y="216" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">RELAY CONTROL</text>

  <rect x="588" y="205" width="108" height="14" rx="3" fill="#1d4ed8"/>
  <text x="642" y="216" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">TEMP MONITORING</text>

  <rect x="48" y="437" width="86" height="14" rx="3" fill="#7e22ce"/>
  <text x="91" y="448" text-anchor="middle" font-size="8" fill="#fff" font-weight="700">SAUNA PANEL</text>

  <!-- ================================================================ -->
  <!-- COMPONENT BOXES                                                   -->
  <!-- ================================================================ -->

  <!-- 12V Tap -->
  <rect x="20" y="72" width="160" height="58" rx="7" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="100" y="97" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">Sauna 12V Tap</text>
  <text x="100" y="114" text-anchor="middle" font-size="10" fill="#60a5fa" font-weight="600">Black + Green wire</text>

  <!-- Buck Converter -->
  <rect x="236" y="72" width="190" height="58" rx="7" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="331" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">Buck Converter</text>
  <text x="331" y="111" text-anchor="middle" font-size="10" fill="#94a3b8">12V → 5V</text>
  <rect x="254" y="118" width="154" height="16" rx="3" fill="#292524" stroke="#78350f" stroke-width="1"/>
  <text x="331" y="130" text-anchor="middle" font-size="8" fill="#fbbf24" font-weight="600">680µF across output terminals</text>

  <!-- AMS1117 -->
  <rect x="630" y="72" width="174" height="58" rx="7" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="717" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">AMS1117</text>
  <text x="717" y="111" text-anchor="middle" font-size="10" fill="#94a3b8">5V → 3.3V</text>
  <rect x="645" y="118" width="154" height="16" rx="3" fill="#292524" stroke="#78350f" stroke-width="1"/>
  <text x="722" y="130" text-anchor="middle" font-size="8" fill="#fbbf24" font-weight="600">100µF across output terminals</text>
  <!-- Fork indicators -->
  <text x="660" y="145" font-size="8" fill="#f59e0b">↙ ESP-01</text>
  <text x="762" y="145" font-size="8" fill="#f59e0b">↘ DS18B20</text>

  <!-- LC Technology Relay Board -->
  <rect x="180" y="220" width="264" height="158" rx="7" fill="#1e293b" stroke="#22c55e" stroke-width="1.5"/>
  <text x="312" y="244" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">LC Technology</text>
  <text x="312" y="260" text-anchor="middle" font-size="10" fill="#4ade80">ESP8266 Relay X2</text>
  <line x1="196" y1="268" x2="428" y2="268" stroke="#334155" stroke-width="1"/>
  <!-- Left port labels -->
  <line x1="180" y1="280" x2="194" y2="280" stroke="#22c55e" stroke-width="1.5"/>
  <text x="198" y="284" font-size="9" fill="#94a3b8">IN+ / IN−</text>
  <line x1="180" y1="298" x2="194" y2="298" stroke="#f97316" stroke-width="1.5"/>
  <text x="198" y="302" font-size="9" fill="#f97316">COM1 / NO1</text>
  <line x1="180" y1="318" x2="194" y2="318" stroke="#f97316" stroke-width="1.5"/>
  <text x="198" y="322" font-size="9" fill="#f97316">COM2 / NO2</text>
  <!-- Right port label -->
  <line x1="444" y1="258" x2="430" y2="258" stroke="#ef4444" stroke-width="1.5"/>
  <text x="426" y="255" text-anchor="end" font-size="9" fill="#ef4444">5V hdr →</text>

  <!-- ESP-01 Temp Node -->
  <rect x="588" y="220" width="214" height="136" rx="7" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="695" y="244" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">ESP-01</text>
  <text x="695" y="260" text-anchor="middle" font-size="10" fill="#60a5fa">Temp Sensor Node</text>
  <line x1="604" y1="268" x2="786" y2="268" stroke="#334155" stroke-width="1"/>
  <!-- Left port labels -->
  <line x1="588" y1="282" x2="602" y2="282" stroke="#ef4444" stroke-width="1.5"/>
  <text x="606" y="286" font-size="9" fill="#ef4444">VCC  ←  3.3V</text>
  <line x1="588" y1="300" x2="602" y2="300" stroke="#64748b" stroke-width="1.5"/>
  <text x="606" y="304" font-size="9" fill="#94a3b8">GND</text>
  <line x1="588" y1="318" x2="602" y2="318" stroke="#eab308" stroke-width="1.5"/>
  <text x="606" y="322" font-size="9" fill="#eab308">GPIO2  →  data only</text>

  <!-- POWER Button -->
  <rect x="48" y="452" width="130" height="58" rx="7" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="113" y="477" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">POWER</text>
  <text x="113" y="493" text-anchor="middle" font-size="9" fill="#c084fc">Control Panel PCB</text>
  <text x="113" y="506" text-anchor="middle" font-size="9" fill="#f97316">COM · NO</text>

  <!-- WORK Button -->
  <rect x="218" y="452" width="130" height="58" rx="7" fill="#1e293b" stroke="#a855f7" stroke-width="1.5"/>
  <text x="283" y="477" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">WORK</text>
  <text x="283" y="493" text-anchor="middle" font-size="9" fill="#c084fc">Control Panel PCB</text>
  <text x="283" y="506" text-anchor="middle" font-size="9" fill="#f97316">COM · NO</text>

  <!-- DS18B20 -->
  <rect x="588" y="444" width="192" height="88" rx="7" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
  <text x="684" y="468" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">DS18B20</text>
  <text x="684" y="484" text-anchor="middle" font-size="9" fill="#f472b6">Probe Module · built-in resistor</text>
  <line x1="604" y1="492" x2="764" y2="492" stroke="#334155" stroke-width="1"/>
  <!-- Right ports (power in from right) -->
  <line x1="780" y1="500" x2="766" y2="500" stroke="#ef4444" stroke-width="1.5"/>
  <text x="762" y="497" text-anchor="end" font-size="9" fill="#ef4444">VCC</text>
  <line x1="780" y1="516" x2="766" y2="516" stroke="#64748b" stroke-width="1.5"/>
  <text x="762" y="513" text-anchor="end" font-size="9" fill="#94a3b8">GND</text>
  <!-- Top port (data from ESP-01 above) -->
  <line x1="588" y1="506" x2="602" y2="506" stroke="#eab308" stroke-width="1.5"/>
  <text x="606" y="510" font-size="9" fill="#eab308">Data  ←  GPIO2</text>

  <!-- ================================================================ -->
  <!-- LEGEND                                                            -->
  <!-- ================================================================ -->
  <rect x="855" y="220" width="318" height="128" rx="7" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="1014" y="242" text-anchor="middle" font-size="12" font-weight="700" fill="#f1f5f9">Legend</text>
  <line x1="870" y1="250" x2="1158" y2="250" stroke="#334155" stroke-width="1"/>
  <line x1="870" y1="266" x2="912" y2="266" stroke="#ef4444" stroke-width="2.5"/>
  <text x="920" y="270" font-size="10" fill="#94a3b8">Positive power  (+)</text>
  <line x1="870" y1="284" x2="912" y2="284" stroke="#64748b" stroke-width="2.5"/>
  <text x="920" y="288" font-size="10" fill="#94a3b8">Ground  (−)</text>
  <line x1="870" y1="302" x2="912" y2="302" stroke="#f97316" stroke-width="2.5"/>
  <text x="920" y="306" font-size="10" fill="#94a3b8">Relay / button signal</text>
  <line x1="870" y1="320" x2="912" y2="320" stroke="#eab308" stroke-width="2.5"/>
  <text x="920" y="324" font-size="10" fill="#94a3b8">1-Wire data</text>
  <line x1="870" y1="338" x2="912" y2="338" stroke="#818cf8" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="920" y="342" font-size="10" fill="#94a3b8">120VAC  (Shelly)</text>

  <!-- ================================================================ -->
  <!-- SHELLY                                                            -->
  <!-- ================================================================ -->
  <rect x="855" y="365" width="318" height="100" rx="7" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="1014" y="390" text-anchor="middle" font-size="13" font-weight="700" fill="#f1f5f9">Shelly 16A</text>
  <text x="1014" y="406" text-anchor="middle" font-size="10" fill="#818cf8">Wall Outlet  ·  120VAC</text>
  <line x1="870" y1="414" x2="1158" y2="414" stroke="#334155" stroke-width="1"/>
  <text x="870" y="430" font-size="9" fill="#94a3b8">switch  ·  power (W)  ·  energy (kWh)</text>
  <text x="870" y="446" font-size="9" fill="#94a3b8">Hard AC cutoff via Home Assistant</text>
  <text x="870" y="458" font-size="9" fill="#94a3b8">Master kill — independent of ESP devices</text>

  <!-- Flow arrows on main power wires -->
  <polygon points="226,92 220,88 220,96" fill="#ef4444"/>
  <polygon points="226,108 220,104 220,112" fill="#64748b"/>

</svg>
