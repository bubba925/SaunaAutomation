<svg viewBox="0 0 1180 730" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">

  <rect width="1180" height="730" fill="#f8fafc"/>

  <text x="590" y="34" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Golden Designs / Dynamic Sauna — Smart Home Wiring Diagram</text>
  <text x="590" y="52" text-anchor="middle" font-size="11" fill="#64748b">ESPHome + Home Assistant via LC Technology ESP8266 Relay X2 + Separate DS18B20 Temp Node + Shelly 16A</text>

  <!-- ===== WIRES ===== -->

  <!-- 12V Tap to Buck -->
  <line x1="200" y1="107" x2="255" y2="107" stroke="#dc2626" stroke-width="2.5"/>
  <line x1="200" y1="123" x2="255" y2="123" stroke="#1e293b" stroke-width="2.5"/>
  <text x="228" y="100" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">+12V</text>
  <text x="228" y="137" text-anchor="middle" font-size="9" fill="#1e293b" font-weight="600">GND</text>

  <!-- Buck to Relay Board -->
  <polyline points="355,157 355,205 285,205 285,248" fill="none" stroke="#dc2626" stroke-width="2.5"/>
  <polyline points="375,157 375,218 305,218 305,248" fill="none" stroke="#1e293b" stroke-width="2.5"/>
  <text x="245" y="206" text-anchor="end" font-size="9" fill="#dc2626" font-weight="600">IN+</text>
  <text x="245" y="220" text-anchor="end" font-size="9" fill="#1e293b" font-weight="600">IN−</text>

  <!-- Relay Board 5V header pin to AMS1117 -->
  <polyline points="487,290 568,290 568,107 648,107" fill="none" stroke="#dc2626" stroke-width="2.5"/>
  <polyline points="487,308 585,308 585,123 648,123" fill="none" stroke="#1e293b" stroke-width="2.5"/>
  <text x="548" y="276" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">5V header pin</text>
  <text x="548" y="288" text-anchor="middle" font-size="8" fill="#64748b">(relay board right header)</text>

  <!-- AMS1117 → ESP-01: left fork, routes left then down into ESP-01 top -->
  <polyline points="695,155 695,200 660,200 660,248" fill="none" stroke="#dc2626" stroke-width="2.5"/>
  <polyline points="712,155 712,215 678,215 678,248" fill="none" stroke="#1e293b" stroke-width="2.5"/>
  <text x="640" y="185" text-anchor="end" font-size="9" fill="#dc2626" font-weight="600">3.3V</text>
  <text x="640" y="215" text-anchor="end" font-size="9" fill="#1e293b" font-weight="600">GND</text>

  <!-- AMS1117 → DS18B20: right fork, routes RIGHT past ESP-01 box entirely, then down, then enters DS18B20 from right -->
  <polyline points="795,155 880,155 880,548 855,548" fill="none" stroke="#dc2626" stroke-width="2.5"/>
  <polyline points="812,155 897,155 897,565 855,565" fill="none" stroke="#1e293b" stroke-width="2.5"/>
  <text x="892" y="360" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600" transform="rotate(-90 892 360)">3.3V → DS18B20 VCC</text>
  <text x="910" y="360" text-anchor="middle" font-size="9" fill="#1e293b" font-weight="600" transform="rotate(-90 910 360)">GND → DS18B20</text>

  <!-- ESP-01 GPIO2 → DS18B20 Data: short wire straight down -->
  <line x1="705" y1="402" x2="705" y2="488" stroke="#ca8a04" stroke-width="2.5"/>
  <text x="718" y="450" font-size="9" fill="#ca8a04" font-weight="600">GPIO2</text>
  <text x="718" y="462" font-size="9" fill="#ca8a04" font-weight="600">Data only</text>

  <!-- Relay COM1/NO1 to POWER button -->
  <polyline points="207,302 88,302 88,543" fill="none" stroke="#ea580c" stroke-width="2.5"/>
  <polyline points="207,322 105,322 105,543" fill="none" stroke="#ea580c" stroke-width="2.5"/>
  <text x="83" y="432" text-anchor="middle" font-size="9" fill="#ea580c" font-weight="600" transform="rotate(-90 83 432)">COM1</text>
  <text x="100" y="432" text-anchor="middle" font-size="9" fill="#ea580c" font-weight="600" transform="rotate(-90 100 432)">NO1</text>

  <!-- Relay COM2/NO2 to WORK button -->
  <polyline points="255,480 255,543" fill="none" stroke="#ea580c" stroke-width="2.5"/>
  <polyline points="275,480 275,543" fill="none" stroke="#ea580c" stroke-width="2.5"/>
  <text x="250" y="515" text-anchor="middle" font-size="9" fill="#ea580c" font-weight="600" transform="rotate(-90 250 515)">COM2</text>
  <text x="268" y="515" text-anchor="middle" font-size="9" fill="#ea580c" font-weight="600" transform="rotate(-90 268 515)">NO2</text>

  <!-- Shelly AC dashed line -->
  <polyline points="1020,495 1020,448" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="1033" y="476" font-size="9" fill="#6366f1">120VAC</text>

  <!-- ===== COMPONENT BOXES ===== -->

  <!-- 12V Tap -->
  <rect x="20" y="75" width="180" height="93" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="110" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Sauna 12V Tap</text>
  <text x="110" y="119" text-anchor="middle" font-size="10" fill="#1d4ed8">Micro-Fit 10-pin Harness</text>
  <text x="110" y="135" text-anchor="middle" font-size="9" fill="#3b82f6">Panel → Roof PSU cable</text>
  <text x="110" y="152" text-anchor="middle" font-size="9" fill="#1d4ed8" font-weight="700">Black + Green wire pair</text>
  <text x="110" y="164" text-anchor="middle" font-size="8" fill="#93c5fd">(always-on · confirmed 12V)</text>

  <!-- Buck Converter -->
  <rect x="255" y="75" width="225" height="80" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="367" y="101" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">Buck Converter</text>
  <text x="367" y="119" text-anchor="middle" font-size="10" fill="#92400e">12V → 5V  (TOBSUN)</text>
  <text x="367" y="136" text-anchor="middle" font-size="9" fill="#b45309">Powers relay board only</text>
  <rect x="282" y="150" width="170" height="22" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="367" y="165" text-anchor="middle" font-size="9" fill="#713f12" font-weight="600">⚡ 680µF cap across output terminals</text>

  <!-- AMS1117 -->
  <rect x="648" y="75" width="185" height="80" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <text x="740" y="101" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">AMS1117 Reg.</text>
  <text x="740" y="119" text-anchor="middle" font-size="10" fill="#92400e">5V → 3.3V</text>
  <text x="740" y="136" text-anchor="middle" font-size="9" fill="#b45309">Powers ESP-01 + DS18B20</text>
  <rect x="658" y="150" width="170" height="22" rx="4" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="743" y="165" text-anchor="middle" font-size="9" fill="#713f12" font-weight="600">⚡ 100µF cap across output</text>
  <!-- Fork label -->
  <text x="695" y="172" text-anchor="middle" font-size="8" fill="#d97706">↙ to ESP-01</text>
  <text x="803" y="172" text-anchor="middle" font-size="8" fill="#d97706">↘ to DS18B20</text>

  <!-- LC Technology Relay Board -->
  <rect x="207" y="248" width="280" height="232" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <text x="347" y="275" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">LC Technology</text>
  <text x="347" y="293" text-anchor="middle" font-size="11" fill="#166534">ESP8266 Relay X2</text>
  <line x1="207" y1="305" x2="220" y2="305" stroke="#16a34a" stroke-width="1.5"/>
  <text x="225" y="309" font-size="9" fill="#15803d">IN+ / IN− (5V power in)</text>
  <line x1="207" y1="325" x2="220" y2="325" stroke="#ea580c" stroke-width="1.5"/>
  <text x="225" y="329" font-size="9" fill="#ea580c">COM1 / NO1 → POWER btn</text>
  <line x1="207" y1="345" x2="220" y2="345" stroke="#ea580c" stroke-width="1.5"/>
  <text x="225" y="349" font-size="9" fill="#ea580c">COM2 / NO2 → WORK btn</text>
  <line x1="487" y1="293" x2="474" y2="293" stroke="#dc2626" stroke-width="1.5"/>
  <text x="470" y="289" text-anchor="end" font-size="9" fill="#dc2626">5V pin → AMS1117</text>
  <line x1="220" y1="363" x2="474" y2="363" stroke="#bbf7d0" stroke-width="1"/>
  <text x="347" y="382" text-anchor="middle" font-size="9" fill="#4ade80">UART on GPIO1 (TX) / GPIO3 (RX)</text>
  <text x="347" y="397" text-anchor="middle" font-size="9" fill="#4ade80">Relay coils: SRD-05VDC-SL-C</text>
  <text x="347" y="412" text-anchor="middle" font-size="9" fill="#4ade80">100ms momentary pulse per press</text>
  <text x="347" y="428" text-anchor="middle" font-size="9" fill="#4ade80">GPIO0 / GPIO2 occupied by relay MCU</text>
  <text x="347" y="444" text-anchor="middle" font-size="9" fill="#16a34a" font-weight="600">→ cannot host temp sensor</text>
  <text x="347" y="462" text-anchor="middle" font-size="9" fill="#86efac">lctech.cc  ·  ESP-01 module</text>

  <!-- ESP-01 Temp Node -->
  <rect x="620" y="248" width="235" height="154" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="737" y="275" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">ESP-01</text>
  <text x="737" y="293" text-anchor="middle" font-size="11" fill="#1e40af">Temperature Sensor Node</text>
  <line x1="620" y1="315" x2="633" y2="315" stroke="#dc2626" stroke-width="1.5"/>
  <text x="638" y="319" font-size="9" fill="#dc2626">VCC  ←  3.3V (AMS1117)</text>
  <line x1="620" y1="333" x2="633" y2="333" stroke="#1e293b" stroke-width="1.5"/>
  <text x="638" y="337" font-size="9" fill="#1e293b">GND  ←  AMS1117</text>
  <line x1="620" y1="351" x2="633" y2="351" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="638" y="355" font-size="9" fill="#ca8a04">GPIO2  →  DS18B20 Data only</text>
  <line x1="633" y1="368" x2="842" y2="368" stroke="#bfdbfe" stroke-width="1"/>
  <text x="737" y="385" text-anchor="middle" font-size="9" fill="#93c5fd">one_wire platform on GPIO2</text>
  <text x="737" y="400" text-anchor="middle" font-size="9" fill="#93c5fd">GPIO2 free — dedicated device</text>

  <!-- POWER Button -->
  <rect x="35" y="543" width="155" height="80" rx="8" fill="#faf5ff" stroke="#7e22ce" stroke-width="2"/>
  <text x="112" y="571" text-anchor="middle" font-size="12" font-weight="700" fill="#4a044e">POWER Button</text>
  <text x="112" y="587" text-anchor="middle" font-size="10" fill="#6b21a8">Control Panel PCB</text>
  <text x="112" y="602" text-anchor="middle" font-size="9" fill="#9333ea">Solder to 2 active pads</text>
  <text x="112" y="616" text-anchor="middle" font-size="9" fill="#9333ea">→ Relay 1  COM + NO</text>

  <!-- WORK Button -->
  <rect x="205" y="543" width="155" height="80" rx="8" fill="#faf5ff" stroke="#7e22ce" stroke-width="2"/>
  <text x="282" y="571" text-anchor="middle" font-size="12" font-weight="700" fill="#4a044e">WORK Button</text>
  <text x="282" y="587" text-anchor="middle" font-size="10" fill="#6b21a8">Control Panel PCB</text>
  <text x="282" y="602" text-anchor="middle" font-size="9" fill="#9333ea">Solder to 2 active pads</text>
  <text x="282" y="616" text-anchor="middle" font-size="9" fill="#9333ea">→ Relay 2  COM + NO</text>

  <!-- DS18B20 module -->
  <rect x="620" y="488" width="235" height="130" rx="8" fill="#fdf2f8" stroke="#be185d" stroke-width="2"/>
  <text x="737" y="512" text-anchor="middle" font-size="13" font-weight="700" fill="#831843">DS18B20 Module</text>
  <text x="737" y="530" text-anchor="middle" font-size="10" fill="#9d174d">Breakout board w/ built-in resistor</text>
  <line x1="633" y1="542" x2="842" y2="542" stroke="#fce7f3" stroke-width="1"/>
  <!-- Power enters from right side -->
  <line x1="855" y1="548" x2="842" y2="548" stroke="#dc2626" stroke-width="1.5"/>
  <text x="838" y="545" text-anchor="end" font-size="9" fill="#831843">VCC ← AMS1117 3.3V</text>
  <line x1="855" y1="565" x2="842" y2="565" stroke="#1e293b" stroke-width="1.5"/>
  <text x="838" y="562" text-anchor="end" font-size="9" fill="#831843">GND ← AMS1117</text>
  <!-- Data enters from top -->
  <line x1="620" y1="582" x2="633" y2="582" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="638" y="586" font-size="9" fill="#831843">Data ← ESP-01 GPIO2</text>
  <text x="737" y="608" text-anchor="middle" font-size="8" fill="#ec4899">Mounted via alum. tape at removed aux port</text>

  <!-- Shelly 16A -->
  <rect x="920" y="448" width="240" height="148" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="1040" y="473" text-anchor="middle" font-size="13" font-weight="700" fill="#312e81">Shelly 16A</text>
  <text x="1040" y="491" text-anchor="middle" font-size="11" fill="#4338ca">Power Monitor — Wall Outlet</text>
  <line x1="933" y1="500" x2="1148" y2="500" stroke="#c7d2fe" stroke-width="1"/>
  <text x="935" y="517" font-size="9" fill="#4338ca">Sauna plugs into Shelly on wall outlet</text>
  <text x="935" y="532" font-size="9" fill="#4338ca">Hard AC cutoff via Home Assistant</text>
  <text x="935" y="547" font-size="9" fill="#4338ca">Rated 16A / 120VAC</text>
  <text x="935" y="563" font-size="9" fill="#6366f1">HA entities: switch (on/off),</text>
  <text x="935" y="578" font-size="9" fill="#6366f1">power (W), energy (kWh)</text>
  <text x="935" y="593" font-size="9" fill="#a5b4fc">Use as master kill in all automations</text>

  <!-- Legend -->
  <rect x="920" y="248" width="240" height="183" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="1040" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Wire Legend</text>
  <line x1="933" y1="276" x2="1148" y2="276" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="936" y1="294" x2="981" y2="294" stroke="#dc2626" stroke-width="2.5"/>
  <text x="989" y="298" font-size="10" fill="#374151">Positive power (+)</text>
  <line x1="936" y1="314" x2="981" y2="314" stroke="#1e293b" stroke-width="2.5"/>
  <text x="989" y="318" font-size="10" fill="#374151">Ground (−)</text>
  <line x1="936" y1="334" x2="981" y2="334" stroke="#ea580c" stroke-width="2.5"/>
  <text x="989" y="338" font-size="10" fill="#374151">Relay / button signal</text>
  <line x1="936" y1="354" x2="981" y2="354" stroke="#ca8a04" stroke-width="2.5"/>
  <text x="989" y="358" font-size="10" fill="#374151">1-Wire data (DS18B20)</text>
  <line x1="936" y1="374" x2="981" y2="374" stroke="#6366f1" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="989" y="378" font-size="10" fill="#374151">120VAC / Shelly</text>
  <line x1="933" y1="392" x2="1148" y2="392" stroke="#e2e8f0" stroke-width="1"/>
  <text x="936" y="408" font-size="9" fill="#64748b">AMS1117 forks: left to ESP-01,</text>
  <text x="936" y="423" font-size="9" fill="#64748b">right around box to DS18B20</text>
  <text x="936" y="438" font-size="9" fill="#64748b">Only data wire returns to GPIO2</text>

  <!-- Section labels -->
  <rect x="20" y="60" width="85" height="17" rx="3" fill="#2563eb"/>
  <text x="62" y="72" text-anchor="middle" font-size="9" fill="white" font-weight="700">POWER SOURCE</text>
  <rect x="207" y="234" width="95" height="17" rx="3" fill="#16a34a"/>
  <text x="254" y="246" text-anchor="middle" font-size="9" fill="white" font-weight="700">RELAY CONTROL</text>
  <rect x="620" y="234" width="110" height="17" rx="3" fill="#2563eb"/>
  <text x="675" y="246" text-anchor="middle" font-size="9" fill="white" font-weight="700">TEMP MONITORING</text>
  <rect x="35" y="528" width="95" height="17" rx="3" fill="#7e22ce"/>
  <text x="82" y="540" text-anchor="middle" font-size="9" fill="white" font-weight="700">SAUNA PANEL</text>
  <rect x="920" y="433" width="110" height="17" rx="3" fill="#4f46e5"/>
  <text x="975" y="445" text-anchor="middle" font-size="9" fill="white" font-weight="700">AC MONITORING</text>

  <!-- Flow arrows -->
  <polygon points="238,103 232,99 232,107" fill="#dc2626"/>
  <polygon points="238,119 232,115 232,123" fill="#1e293b"/>

</svg>
